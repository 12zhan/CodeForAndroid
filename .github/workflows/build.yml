name: Android CI Build

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.5

      - name: Decode Keystore (if release)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Build Debug APK
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK
        if: startsWith(github.ref, 'refs/tags/')
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Debug APK
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: MobileCodex-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Upload Release APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: MobileCodex-release-${{ github.ref_name }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: MobileCodex-release-${{ github.ref_name }}
          path: ./release-apk

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Mobile Codex ${{ steps.version.outputs.VERSION }}
          body: |
            ## Mobile Codex ${{ steps.version.outputs.VERSION }}
            
            ### 下载
            - 下载下方 `MobileCodex-release.apk` 安装到 Android 设备
            
            ### 更新内容
            - 请在此处添加更新日志
          files: ./release-apk/*.apk
          draft: false
          prerelease: false
